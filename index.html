<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes Premium</title>
    <meta name="description" content="Aplicación de gestión de clientes (CRM) moderna y rápida.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-users"></i> ClientFlow</h1>
            <p>Gestiona tus clientes con elegancia y eficiencia</p>
        </header>

        <main>
            <section class="add-client-section glass-panel">
                <h2><i class="fa-solid fa-user-plus"></i> Añadir Nuevo Cliente</h2>
                <form id="add-client-form">
                    <div class="form-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" placeholder="Ej. Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="Ej. juan@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Teléfono</label>
                        <input type="tel" id="phone" placeholder="Ej. +34 600 000 000">
                    </div>
                    <div class="form-group">
                        <label for="status">Estado Inicial</label>
                        <div class="custom-select-wrapper">
                            <select id="status" required>
                                <option value="lead">🌟 Prospecto</option>
                                <option value="active">🔥 Activo</option>
                                <option value="pending">⏳ En Pausa</option>
                                <option value="completed">✅ Completado</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary"><span>Registrar Cliente</span> <i
                            class="fa-solid fa-arrow-right"></i></button>
                </form>
            </section>

            <section class="clients-list-section">
                <div class="list-header">
                    <h2><i class="fa-solid fa-list"></i> Tus Clientes</h2>
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="lead">Prospectos</button>
                        <button class="filter-btn" data-filter="active">Activos</button>
                    </div>
                </div>
                <div id="clients-grid" class="clients-grid">
                    <!-- Los clientes se inyectarán aquí con JS -->
                </div>
                <div id="empty-state" class="empty-state glass-panel" style="display: none;">
                    <i class="fa-solid fa-inbox"></i>
                    <h3>No hay clientes aún</h3>
                    <p>Añade tu primer cliente usando el formulario de arriba.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal para editar estado -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal glass-panel">
            <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <h3>Actualizar Estado</h3>
            <p id="modal-client-name" class="modal-subtitle">Cliente</p>
            <div class="status-options">
                <button class="status-btn" data-value="lead">🌟 Prospecto</button>
                <button class="status-btn" data-value="active">🔥 Activo</button>
                <button class="status-btn" data-value="pending">⏳ En Pausa</button>
                <button class="status-btn" data-value="completed">✅ Completado</button>
            </div>
            <button id="delete-client-btn" class="btn-danger"><i class="fa-solid fa-trash"></i> Eliminar
                Cliente</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
